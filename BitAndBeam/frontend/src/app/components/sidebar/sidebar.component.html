<aside class="sidebar" [style.width.px]="sidebarWidth">
  <div class="resize-handle" (mousedown)="startResizing($event)"></div>
  <!-- Top: Logo -->
  <div class="sidebar-top">
    <div class="logo-section">
      <img src="assets/team-logo.png" alt="Bit & Beam Logo" class="logo-img" />
      <span class="logo-text">BIT & BEAM</span>
    </div>
  </div>

  <!-- Middle: Navigation -->
  <div class="sidebar-middle">
    <button class="add-btn" (click)="addBuilding()">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 mr-2" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M10 3a1 1 0 00-1 1v5H4a1 1 0 100 2h5v5a1 1 0 102 0v-5h5a1 1 0 100-2h-5V4a1 1 0 00-1-1z" clip-rule="evenodd" />
      </svg>
      Add Building
    </button>
    <div class="buildings">
      <div *ngFor="let group of groupedDocuments">
        <div class="building-name">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 mr-1" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z" clip-rule="evenodd" />
          </svg>
          {{ group.buildingName }}
          <button *ngIf="group.buildingId !== null" (click)="deleteBuilding(group.buildingId)" class="delete-btn">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9z" clip-rule="evenodd" />
            </svg>
          </button>
        </div>
        <div class="document" *ngFor="let doc of group.documents" (click)="viewDocument(doc)">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 mr-1" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" clip-rule="evenodd" />
          </svg>
          {{ doc.name }}
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom: User Info & Logout -->
  <div class="sidebar-bottom">
    <div *ngIf="session.isAuthenticated()" class="chat-profile-section">
      <!-- Profile button that toggles dropdown -->
      <button (click)="toggleProfileMenu()" class="profile-button">
        <div class="profile-avatar">
          <svg xmlns="http://www.w3.org/2000/svg" class="profile-icon" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
          </svg>
        </div>
        <div class="profile-info">
          <span class="profile-name">{{ session.currentUser()?.email }}</span>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" [ngClass]="{'rotate-180': profileMenuOpen}" class="dropdown-arrow" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
        </svg>
      </button>
      
      <!-- Profile dropdown -->
      <div *ngIf="profileMenuOpen" [@dropdownAnimation] class="profile-dropdown">
        <!-- Theme selector -->
        <div class="theme-selector">
          <label class="theme-label">Theme</label>
          <select [(ngModel)]="themeMode" (change)="onThemeModeChange($event)" class="theme-select">
            <option value="device">Match system</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </div>
        
        <!-- Settings button -->
        <button (click)="openSettings()" class="dropdown-item">
          <svg xmlns="http://www.w3.org/2000/svg" class="item-icon" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd" />
          </svg>
          <span>Settings</span>
        </button>
        
        <!-- Logout button -->
        <button (click)="logout()" class="dropdown-item logout-item">
          <svg xmlns="http://www.w3.org/2000/svg" class="item-icon" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 001 1h12a1 1 0 001-1V7.414l-4-4H3z" clip-rule="evenodd" />
          </svg>
          <span>Logout</span>
        </button>
      </div>
    </div>
  </div>
</aside>
