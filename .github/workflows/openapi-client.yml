name: OpenAPI Client Generation

on:
  push:
    branches:
      - main
    paths:
      - 'BitAndBeam/backend/**'
      - 'BitAndBeam/openapi-client/**'
  pull_request:
    branches:
      - main
    paths:
      - 'BitAndBeam/backend/**'
      - 'BitAndBeam/openapi-client/**'
  workflow_call:
    outputs:
      sdk_updated:
        description: "Whether the SDK was updated"
        value: ${{ jobs.generate-client.outputs.sdk_updated }}

jobs:
  generate-client:
    runs-on: ubuntu-latest
    outputs:
      sdk_updated: ${{ steps.check_changes.outputs.sdk_updated }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Clean up existing generated files
        run: |
          rm -rf BitAndBeam/frontend/src/api/*
          mkdir -p BitAndBeam/frontend/src/api

      - name: Build and start services
        working-directory: BitAndBeam
        run: |
          # Ensure the api directory has correct permissions
          sudo chown -R $USER:$USER frontend/src/api
          
          # Start backend first
          docker compose -f docker-compose-prod.yml up -d backend
          
          # Run openapi-client to generate SDK
          docker compose -f docker-compose-prod.yml up openapi-client
          
          # Fix permissions of generated files
          sudo chown -R $USER:$USER frontend/src/api

      - name: Cleanup Docker containers
        working-directory: BitAndBeam
        if: always()
        run: |
          docker compose -f docker-compose-prod.yml down
          docker image prune -f

      - name: Check for changes in generated SDK
        id: check_changes
        run: |
          if [[ -n $(git status --porcelain BitAndBeam/frontend/src/api) ]]; then
            echo "Changes detected in generated SDK"
            echo "sdk_updated=true" >> $GITHUB_OUTPUT
          else
            echo "No changes in generated SDK"
            echo "sdk_updated=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit SDK changes
        if: steps.check_changes.outputs.sdk_updated == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add BitAndBeam/frontend/src/api
          git commit -m "chore: update openapi-client-generated SDK"
          git push