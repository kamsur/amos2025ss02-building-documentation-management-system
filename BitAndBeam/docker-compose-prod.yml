version: "3.8"

services:
  backend:
    image: ghcr.io/amosproj/bitandbeam-backend:latest
    restart: always
    ports:
      - "5000:5000"  # Exposed to internet
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      tika:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - CORS__AllowedOrigins=http://amos.b-iq.net,https://amos.b-iq.net
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=bitandbeam;Username=postgres;Password=postgres
      - Tika__ServerUrl=http://tika:9998
    volumes:
      - documentdata:/app/documents
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: ["dotnet", "BitAndBeam.dll"]
    networks:
      - web
      - internal

  frontend:
    image: ghcr.io/amosproj/bitandbeam-frontend:latest
    restart: always
    environment:
      - API_URL=http://amos.b-iq.net:5000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"  # Exposed to internet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - web
      - internal

  ollama:
    build:
      context: ./ollama
      dockerfile: Dockerfile
    image: ghcr.io/amosproj/bitandbeam-ollama:latest
    container_name: ollama
    restart: always
    ports:
      - "11434:11434"  # External API
      - "8000:8000"    # Also external
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || echo 'ok'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - web
      - internal

  postgres:
    image: postgres:17
    container_name: bitandbeam_postgres
    restart: always
    volumes:
      - .:/app
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bitandbeam
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "5432"  # Only exposed internally
    networks:
      - internal

  tika:
    build:
      context: ./tika
      dockerfile: Dockerfile
    container_name: bitandbeam_tika
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9998/version"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "9998"
    networks:
      - internal

volumes:
  documentdata:
  pgdata:

networks:
  internal:
    driver: bridge
  web:
    driver: bridge
