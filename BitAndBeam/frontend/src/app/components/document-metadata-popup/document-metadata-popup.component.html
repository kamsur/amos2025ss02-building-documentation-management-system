<div class="popup-overlay">
  <div class="popup-content">
    <div class="popup-header">
      <h2>Document Details</h2>
      <button class="close-button" (click)="onClose()" aria-label="Close">×</button>
    </div>
    
    <div class="popup-body">
      <p class="document-name">📄 <strong>{{ documentName }}</strong></p>
      
      <div class="form-group">
        <label for="categorySelect">Document Category:</label>
        <select id="categorySelect" [(ngModel)]="selectedCategoryId" required>
          <option [ngValue]="null" disabled>Select a category</option>
          <option *ngFor="let category of categories" [value]="category.id">
            {{ category.name }}
          </option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="buildingSelect">Building:</label>
        <div class="building-selection-container">
          <select id="buildingSelect" [(ngModel)]="selectedBuildingId">
            <!-- No Building option -->
            <option [ngValue]="null">No Building</option>
            
            <!-- Available buildings options -->
            <optgroup label="Available Buildings" *ngIf="buildings.length > 0">
              <option *ngFor="let building of buildings" [value]="building.id">
                {{ building.name }}
              </option>
            </optgroup>
          </select>
          <!-- Create new building button -->
          <button type="button" class="add-building-button" (click)="toggleCreateBuilding()">{{ showCreateBuilding ? 'Cancel' : 'Create New Building' }}</button>
        </div>
      </div>
      
      <div class="create-building-section" *ngIf="showCreateBuilding">
        <div class="form-group">
          <label for="newBuildingName">New Building Name:</label>
          <input type="text" id="newBuildingName" [(ngModel)]="newBuildingName" placeholder="Enter building name">
        </div>
        
        <div class="form-group">
          <label for="sourceBuildingSelect">Create from existing (optional):</label>
          <select id="sourceBuildingSelect" [(ngModel)]="sourceBuilding">
            <option [ngValue]="null">Create from scratch</option>
            <option *ngFor="let building of buildings" [value]="building.id">
              {{ building.name }}
            </option>
          </select>
        </div>
        
        <div class="form-controls">
          <button type="button" (click)="createNewBuilding()" class="create-button">Create Building</button>
          <span class="buildings-link" (click)="goToBuildings()">Manage all buildings</span>
        </div>
      </div>
    </div>
    
    <div class="popup-footer">
      <button class="cancel-button" (click)="onClose()">Cancel</button>
      <button class="save-button" (click)="onSave()" [disabled]="!selectedBuildingId || !selectedCategoryId">
        Save
      </button>
    </div>
  </div>
</div>
