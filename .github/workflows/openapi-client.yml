name: OpenAPI Client Generation

on:
  push:
    branches:
      - main
    paths:
      - 'BitAndBeam/backend/**'
      - 'BitAndBeam/openapi-client/**'
  pull_request:
    branches:
      - main
    paths:
      - 'BitAndBeam/backend/**'
      - 'BitAndBeam/openapi-client/**'
  workflow_call:

permissions:
  contents: write
  pull-requests: write
  id-token: write
  issues: write

jobs:
  generate-client:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Clean up existing generated files
        run: |
          rm -rf BitAndBeam/frontend/src/api/*
          mkdir -p BitAndBeam/frontend/src/api

      - name: Build and start services
        working-directory: BitAndBeam
        run: |
          # Ensure the api directory has correct permissions
          sudo chown -R $USER:$USER frontend/src/api
          
          # Start backend first
          docker compose -f docker-compose-prod.yml up -d backend
          
          # Run openapi-client to generate SDK
          docker compose -f docker-compose-prod.yml up openapi-client
          
          # Fix permissions of generated files
          sudo chown -R $USER:$USER frontend/src/api

      - name: Cleanup Docker containers
        working-directory: BitAndBeam
        if: always()
        run: |
          docker compose -f docker-compose-prod.yml down
          docker image prune -f

      - name: Check for changes in generated SDK
        id: check_changes
        run: |
          if [[ -n $(git status --porcelain BitAndBeam/frontend/src/api) ]]; then
            echo "Changes detected in generated SDK"
            echo "sdk_updated=true" >> $GITHUB_OUTPUT
          else
            echo "No changes in generated SDK"
            echo "sdk_updated=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup GitHub CLI
        if: steps.check_changes.outputs.sdk_updated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Configuring GitHub CLI..."
          if ! gh auth status &>/dev/null; then
            gh auth login --with-token <<< "${{ secrets.GITHUB_TOKEN }}"
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.sdk_updated == 'true'
        run: |
          # Create a new branch
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          BRANCH_NAME="feat/update-openapi-sdk-$(date +%Y%m%d-%H%M%S)"
          git checkout -b $BRANCH_NAME
          
          # Commit changes
          git add BitAndBeam/frontend/src/api
          git commit -m "chore: update generated SDK"
          
          # Push branch
          git push origin $BRANCH_NAME
          
          # Create PR using GitHub CLI
          gh pr create \
            --title "chore: update OpenAPI generated SDK" \
            --body "Auto-generated PR to update the OpenAPI SDK" \
            --base main \
            --head $BRANCH_NAME