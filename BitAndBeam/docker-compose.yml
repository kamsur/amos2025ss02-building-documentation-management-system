  #     - ollamadata:/root/.ollama
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:11434"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5001:5000"
    depends_on:
      postgres:
        condition: service_healthy
      tika:
        condition: service_healthy
      # - ollama
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=bitandbeam;Username=postgres;Password=postgres
      - Tika__ServerUrl=http://tika:9998
    volumes:
      - documentdata:/app/documents
      - documents2data:/app/documents2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://backend:5000/swagger/v1/swagger.json"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - API_URL=http://localhost:5001

  openapi-client:
    build:
      context: ./openapi-client
      dockerfile: Dockerfile
    container_name: openapi_generator
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend/src/api:/local/generated-sdk
    environment:
      - SWAGGER_URL=http://backend:5000
      - BACKEND_URL=http://localhost:5001

  postgres:
    image: postgres:17
    container_name: bitandbeam_postgres
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - .:/app
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bitandbeam
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  tika:
    build:
      context: ./tika
      dockerfile: Dockerfile
    container_name: bitandbeam_tika
    restart: always
    ports:
      - "9998:9998"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://tika:9998/version"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  # ollamadata:
  documentdata:
  documents2data:
  pgdata:
