<div class="container">
    <app-sidebar [currentRoute]="'upload'"></app-sidebar>
    <div class="content-wrapper">
        <div class="main-content">
            <div class="welcome-section">
                <h1>Welcome to BitAndBeam Document Management</h1>
                <p>To get started, chat with our AI Assistant below. You can upload documents by:</p>
                <ul>
                    <li>Dragging and dropping files into the chat area</li>
                    <li>Clicking the paperclip icon to browse for files</li>
                    <li>Simply asking the AI for help with your documents</li>
                </ul>
            </div>
        </div>
        
        <!-- Enhanced AI Assistant with integrated file upload -->
        <app-ai-assistant 
            [selectedBuildingId]="selectedBuildingId"
            (fileUploaded)="onFileUploaded($event)">
        </app-ai-assistant>
    </div>
</div>
