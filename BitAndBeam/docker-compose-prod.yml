services:
  backend:
    image: ghcr.io/amosproj/bitandbeam-backend:latest
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - ollama
      - tika
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=bitandbeam;Username=postgres;Password=postgres
      - ASPNETCORE_URLS=http://+:5000
      - CORS__AllowedOrigins=http://amos.b-iq.net,https://amos.b-iq.net
      - Tika__ServerUrl=http://tika:9998
    volumes:
      - documentdata:/app/documents


  frontend:
    image: ghcr.io/amosproj/bitandbeam-frontend:latest
    restart: always
    environment:
      - API_URL=http://amos.b-iq.net:5000
    depends_on:
      - backend
    ports:
      - "80:80"

  ollama:
    image: ghcr.io/amosproj/bitandbeam-ollama:latest
    container_name: ollama
    restart: always
    ports:
      - "11434:11434"
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:17
    container_name: bitandbeam_postgres
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - .:/app
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bitandbeam

  tika:
    image: apache/tika
    container_name: bitandbeam_tika
    restart: always
    ports:
      - "9998:9998"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9998/version"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  documentdata:
  pgdata:
