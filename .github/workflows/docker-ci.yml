name: Start default web service

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  check-openapi:
    uses: ./.github/workflows/openapi-client.yml

  build-and-deploy:
    needs: check-openapi
    runs-on: ubuntu-latest
    if: always() && (needs.check-openapi.result == 'success' || needs.check-openapi.result == 'skipped')

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0      # ← fetch all history so “before” commit exists locally

      # ---------------- detect BitAndBeam changes ----------------
      - name: Check if BitAndBeam folder changed
        id: changed
        run: |
          BEFORE_SHA="${{ github.event.before }}"

          echo "Comparing $BEFORE_SHA … ${{ github.sha }}"

          if [ "$BEFORE_SHA" != "" ] && git diff --name-only "$BEFORE_SHA" "${{ github.sha }}" | grep -q '^BitAndBeam/'; then
            echo "BitAndBeam folder changed."
            echo "changed=true"  >> "$GITHUB_OUTPUT"
          else
            echo "BitAndBeam folder unchanged."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Upload project to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.PROJECT_SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "BitAndBeam"
          target: "~/"

      - name: Stop and remove all containers
        run: |
          docker ps -aq | xargs -r docker stop
          docker ps -aq | xargs -r docker rm

      - name: Remove all Docker images
        run: |
          docker images -aq | xargs -r docker rmi -f

      - name: Remove all Docker volumes
        run: |
          docker volume ls -q | xargs -r docker volume rm

      # - name: Delete all images from GHCR
      #   env:
      #     GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #   run: |
      #     IMAGE_NAMES="bitandbeam-frontend bitandbeam-backend bitandbeam-ollama"
      #     for IMAGE in $IMAGE_NAMES; do
      #       echo "Deleting all versions of $IMAGE from GHCR..."
      #       gh api -H "Accept: application/vnd.github+json" /orgs/${{ github.repository_owner }}/packages/container/$IMAGE/versions | \
      #         jq '.[].id' | \
      #         xargs -I {} gh api --method DELETE -H "Accept: application/vnd.github+json" /orgs/${{ github.repository_owner }}/packages/container/$IMAGE/versions/{}
      #     done

      - name: Deploy to Remote Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROJECT_SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/BitAndBeam

            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Cleaning .NET build artifacts..."
            # Clean .NET build artifacts
            # dotnet clean

            # Stop running stack
            # docker compose down --remove-orphans
            # docker compose -f docker-compose-prod.yml down --remove-orphans

            # --- uncomment to reset DB volume ---
            # echo "Dropping Postgres volume to force schema reinitialization..."
            # docker volume rm bitandbeam_pgdata bitandbeam_documentdata || true

            # --- remove old images ONLY when BitAndBeam folder changed ---
            if [ "${{ steps.changed.outputs.changed }}" = "true" ]; then
              echo "BitAndBeam changed – removing old images."
              # docker rmi ghcr.io/amosproj/bitandbeam-frontend:latest || true
              # docker rmi ghcr.io/amosproj/bitandbeam-backend:latest || true
              # docker rmi ghcr.io/amosproj/bitandbeam-ollama:latest || true
            else
              echo "BitAndBeam unchanged – keeping existing images."
            fi

            # Build all required services
            docker compose -f docker-compose-prod.yml build --no-cache -t frontend backend ollama postgres tika

            # Push all built images
            docker compose -f docker-compose-prod.yml push frontend backend ollama postgres tika

            # Start only the required services
            docker compose -f docker-compose-prod.yml up -d frontend backend ollama postgres tika

