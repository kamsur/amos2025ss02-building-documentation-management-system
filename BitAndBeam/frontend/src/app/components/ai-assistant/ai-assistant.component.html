<!-- Floating AI Assistant wrapper -->
<div class="ai-assistant-wrapper" [class.global-widget]="globalMode">
  <!-- Main AI assistant container -->
  <div class="ai-assistant" 
       [class.hidden-interface]="!showChatInterface"
       [class.dark-mode]="isDarkMode"
       [class.drag-over]="isDragOver"
       [class.global-mode]="globalMode"
       (dragover)="onDragOver($event)" 
       (dragleave)="onDragLeave($event)"
       (drop)="onDrop($event)">
    
    <div class="assistant-header">
      <div class="header-title">
        <i class="fa fa-robot"></i>
        <h3>AI Assistant</h3>
      </div>
      <button class="close-btn" (click)="hideChat()" title="Minimize">
        <i class="fa fa-minus"></i>
      </button>
    </div>

    <!-- Chat messages - scrollable -->
    <div class="chat-content">
      <div *ngIf="messages.length === 0" class="welcome-message">
        <p>👋 Hi there! How can I help you today?</p>
        <p class="hint">You can ask me anything about your building documentation.</p>
        <div class="suggestion-chips">
          <button class="suggestion-chip" (click)="insertSuggestion('Search for documents')">
            <i class="fa fa-search"></i> Search for documents
          </button>
          <button class="suggestion-chip" (click)="insertSuggestion('Upload a file')">
            <i class="fa fa-upload"></i> Upload a file
          </button>
          <button class="suggestion-chip" (click)="insertSuggestion('Help me with...')">
            <i class="fa fa-question-circle"></i> Help me with...
          </button>
        </div>
      </div>
      <div *ngFor="let msg of messages" 
           [ngClass]="msg.sender === 'user' ? 'user-message' : 'ai-message'"
           [class.file-message]="msg.isFileUpload">
        <div class="message-header" *ngIf="msg.sender !== 'user'">
          <i class="fa fa-robot"></i>
          <span class="sender-name">AI Assistant</span>
        </div>
        <div class="message-content">
          <span [innerHTML]="msg.text | markdownBold"></span>
        </div>
        
        <!-- File upload info if this message is a file upload -->
        <div class="file-info" *ngIf="msg.isFileUpload && msg.fileInfo">
          <div class="file-icon">
            <i class="fa fa-file-alt"></i>
          </div>
          <div class="file-details">
            <div class="file-name">{{ msg.fileInfo.name }}</div>
            <div class="file-status">{{ msg.fileInfo.status }}</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Chat input -->
    <div class="chat-input-container">
      <form (ngSubmit)="sendMessage()" class="chat-form">
        <div class="input-container">
          <input 
            type="text" 
            [(ngModel)]="userInput" 
            name="userInput" 
            placeholder="Ask me anything..."
            [disabled]="isProcessing">
          <div class="drag-hint" *ngIf="!uploading">
            <i class="fa fa-cloud-upload-alt"></i> Drop files here
          </div>
        </div>
        <button 
          type="submit" 
          class="send-btn" 
          [disabled]="!userInput.trim() || isProcessing">
          <i class="fa fa-paper-plane"></i>
        </button>
      </form>
    </div>
  </div>

  <!-- Upload progress display -->
  <div *ngIf="uploading" class="upload-progress">
    <div class="spinner"></div>
    <div>Uploading file... {{ uploadProgress }}%</div>
    <div class="progress-bar-container">
      <div class="progress-bar" [style.width.%]="uploadProgress"></div>
    </div>
  </div>

  <!-- Error message display -->
  <div *ngIf="errorMessage" class="error-message">
    <i class="fa fa-exclamation-circle"></i>
    {{ errorMessage }}
    <button class="error-close" (click)="errorMessage = ''">
      <i class="fa fa-times"></i>
    </button>
  </div>

  <!-- Toggle button (visible when chat is hidden) -->
  <button 
    *ngIf="!showChatInterface" 
    class="chat-toggle-btn"
    (click)="showChat()"
    title="Chat with AI Assistant">
    <i class="fa fa-robot"></i>
  </button>
</div>

<!-- Document metadata popup -->
<div class="metadata-popup-wrapper" *ngIf="showMetadataPopup && uploadedDocumentId">
  <app-document-metadata-popup 
    [documentId]="uploadedDocumentId"
    [selectedBuildingId]="selectedBuildingId"
    (close)="onCloseMetadataPopup()"
    (save)="onSaveMetadata($event)">
  </app-document-metadata-popup>
</div>
