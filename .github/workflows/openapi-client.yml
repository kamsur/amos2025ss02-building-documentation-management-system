name: OpenAPI Client Generation

on:
  push:
    branches:
      - main
    paths:
      - 'BitAndBeam/backend/**'
      - 'BitAndBeam/openapi-client/**'
  pull_request:
    branches:
      - main
    paths:
      - 'BitAndBeam/backend/**'
      - 'BitAndBeam/openapi-client/**'

jobs:
  generate-client:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Clean up existing generated files
        run: |
          rm -rf BitAndBeam/frontend/src/api/*
          mkdir -p BitAndBeam/frontend/src/api

      - name: Build and start services
        working-directory: BitAndBeam
        env:
          BACKEND_URL: http://backend:5000
        run: |
          # Ensure the api directory has correct permissions
          sudo chown -R $USER:$USER frontend/src/api
          
          # Start services
          docker compose up -d backend
          docker compose up openapi-client
          
          # Fix permissions of generated files
          sudo chown -R $USER:$USER frontend/src/api

      - name: Verify generated client
        working-directory: BitAndBeam/frontend
        run: |
          if [ ! -d "src/api" ] || [ -z "$(ls -A src/api)" ]; then
            echo "Error: Generated API client is missing or empty"
            exit 1
          fi

      - name: Create Pull Request with updated client
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: "chore: update generated OpenAPI client"
          title: "chore: update generated OpenAPI client"
          body: "This PR updates the generated OpenAPI TypeScript client based on backend API changes."
          branch: "chore/update-openapi-client"
          base: "main"
          labels: "automated,api-client"
          delete-branch: true 