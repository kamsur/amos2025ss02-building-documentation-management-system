name: Start Ollama Service Only

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'BitAndBeam/ollama/**'
      - '.github/workflows/ollama-ci.yml'

jobs:
  build-and-deploy-ollama:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Check if ollama folder changed
        id: changed
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          echo "Comparing $BEFORE_SHA … ${{ github.sha }}"
          if [ "$BEFORE_SHA" != "" ] && git diff --name-only "$BEFORE_SHA" "${{ github.sha }}" | grep -q '^BitAndBeam/ollama/'; then
            echo "Ollama folder changed."
            echo "changed=true"  >> "$GITHUB_OUTPUT"
          else
            echo "Ollama folder unchanged."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ollama image
        uses: docker/build-push-action@v5
        with:
          context: ./BitAndBeam/ollama
          push: true
          tags: |
            ghcr.io/amosproj/bitandbeam-ollama:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: List files for debug
        run: |
          ls -l BitAndBeam/
          ls -l BitAndBeam/ollama || true
          ls -l BitAndBeam/docker-compose-prod.yml || true
          echo "Current directory:"
          pwd
          echo "Contents:"
          ls -l


      - name: Upload ollama project and compose file to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.PROJECT_SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "ollama docker-compose-prod.yml"
          target: "~/BitAndBeam"


      - name: Deploy Ollama to Remote Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PROJECT_SERVER_IP }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/BitAndBeam
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            # Stop running ollama container
            docker compose -f docker-compose-prod.yml stop ollama || true
            # Remove old image if ollama folder changed
            if [ "${{ steps.changed.outputs.changed }}" = "true" ]; then
              echo "Ollama folder changed – removing old image."
              docker rmi ghcr.io/amosproj/bitandbeam-ollama:latest || true
            else
              echo "Ollama folder unchanged – keeping existing image."
            fi
            # Always pull latest image
            docker compose -f docker-compose-prod.yml pull ollama
            # Relaunch only ollama
            docker compose -f docker-compose-prod.yml up -d ollama
            # docker compose -f docker-compose-prod.yml logs ollama --tail=50
            # docker compose -f docker-compose-prod.yml exec ollama printenv
