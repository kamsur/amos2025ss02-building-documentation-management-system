<aside class="sidebar" [class.collapsed]="isExplorerCollapsed">
  <!-- Explorer Panel -->
  <!-- Button always visible -->
  <aside>
    <button class="collapse-btn" (click)="toggleExplorer()">☰</button>
  </aside>
  <!-- Only the file list collapses -->
  <div class="file-explorer" [class.collapsed]="isExplorerCollapsed">
  </div>
  <!-- Top: Logo -->
  <div class="sidebar-top">
    <div class="logo-section">
      <img src="assets/team-logo.png" alt="Bit & Beam Logo" class="logo-img" />
      <span class="logo-text">BIT & BEAM</span>
    </div>
  </div>

  <!-- Middle: Navigation -->
  <div class="sidebar-middle">
    <button class="add-btn" (click)="addBuilding()">+ Add Building</button>
    <div class="buildings">
      <div *ngFor="let group of groupedDocuments">
        <div class="building-name">
           📁 {{ group.buildingName }}
          <button *ngIf="group.buildingId !== null" (click)="deleteBuilding(group.buildingId)">🗑️</button>
        </div>
        <div class="document" *ngFor="let doc of group.documents" (click)="viewDocument(doc)">
          📄 {{ doc.name }}
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom: User Info & Logout -->
  <div class="sidebar-bottom">
    <div *ngIf="session.isAuthenticated()" class="user-welcome">
      <div class="avatar">👤</div>
      <div class="welcome-text">
        <div class="greeting">Welcome,</div>
        <div class="username">{{ session.currentUser()?.email }}</div>
      </div>
    </div>
    <div class="sidebar-actions">
      <!-- Theme toggle switch -->
      <div class="theme-toggle">
        <label for="theme-mode-select" class="toggle-label">Theme:</label>
        <select id="theme-mode-select" [(ngModel)]="themeMode" (change)="onThemeModeChange($event)" class="theme-mode-select">
          <option value="device">Device Mode</option>
          <option value="light">Light</option>
          <option value="dark">Dark</option>
        </select>
      </div>
      <button class="logout-btn" (click)="logout()" *ngIf="session.isAuthenticated()">Logout</button>
    </div>
  </div>

</aside>
