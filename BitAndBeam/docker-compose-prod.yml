services:
  backend:
    image: ghcr.io/amosproj/bitandbeam-backend:latest
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - ollama
      - tika
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=bitandbeam;Username=postgres;Password=postgres
      - ASPNETCORE_URLS=http://+:5000
      - CORS__AllowedOrigins=http://amos.b-iq.net,https://amos.b-iq.net
      - Tika__ServerUrl=http://tika:9998
    volumes:
      - documentdata:/app/documents


  frontend:
    image: ghcr.io/amosproj/bitandbeam-frontend:latest
    restart: always
    environment:
      - API_URL=http://amos.b-iq.net:5000
    depends_on:
      - backend
    ports:
      - "80:80"

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:17
    container_name: bitandbeam_postgres
    restart: always
    ports:
      - "11434:11434"
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama


  tika:
    image: apache/tika
    container_name: bitandbeam_tika
    restart: always
    ports:
      - "9998:9998"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9998/version"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ollamadata:
  documentdata:
  pgdata:
